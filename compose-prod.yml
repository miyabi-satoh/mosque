volumes:
  db_data:

services:
  mosque-node:
    container_name: mosque-node
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mosque-strapi

  mosque-strapi:
    container_name: mosque-strapi
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.strapi
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: mosque-db
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      NODE_ENV: production
    volumes:
      - ./strapi/config:/opt/app/config
      - ./strapi/src:/opt/app/src
      - ./strapi/package.json:/opt/package.json
      - ./strapi/yarn.lock:/opt/yarn.lock
      - ./strapi/public/uploads:/opt/app/public/uploads
      - ./.env:/opt/app/.env
    ports:
      - "1337:1337"
    depends_on:
      - mosque-db

  mosque-web:
    container_name: mosque-web
    restart: always
    image: nginx:alpine
    volumes:
      - ./nginx/mosque.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - mosque-node

  mosque-db:
    container_name: mosque-db
    restart: always
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_DB: ${DATABASE_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./initdb.d:/docker-entrypoint-initdb.d
      - db_data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
